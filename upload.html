<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolve Coaches — Upload</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;900&display=block" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="nav">
    <a href="catalog.html" class="brand"><img src="favicon.png" class="brand-logo" alt=""><span class="brand-name">Evolve Coaches Video Library</span></a>
    <div class="nav-links">
      <a href="catalog.html">Catalog</a>
      <a href="upload.html" class="active">Upload</a>
      <button class="nav-signout" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <main class="page" id="main-page">

    <h1 class="page-title">Upload</h1>

    <!-- Shared drop zone -->
    <div class="file-drop" id="file-drop">
      <input type="file" id="video-file" accept="video/*" multiple>
      <p id="file-label">Drop videos here or click to browse</p>
      <p id="file-ai-hint" style="font-size:0.8rem;margin-top:0.375rem;">AI will suggest a movement name for each video.</p>
    </div>

    <!-- ── Single mode (hidden until a single file is selected) ── -->
    <div id="single-mode" class="hidden">

      <!-- Video preview (shown after frame is captured) -->
      <div id="single-preview" class="single-preview hidden">
        <img id="single-thumb" alt="Video preview">
        <div class="thumb-play-overlay">&#9654;</div>
      </div>

      <div id="error-msg" class="error hidden"></div>

      <form id="upload-form" novalidate>

        <div class="field">
          <label for="name">Movement Name <span class="required">*</span></label>
          <input type="text" id="name" placeholder="e.g. Barbell Back Squat" required>
          <div id="name-warning" class="warning hidden"></div>
          <p id="name-ocr-hint" class="field-hint hidden"></p>
        </div>

        <div class="field">
          <label for="alt-names">Alternative Names</label>
          <input type="text" id="alt-names" placeholder="e.g. RDL, Stiff-leg deadlift">
          <p class="field-hint">Other names coaches use for this movement — separate with commas.</p>
        </div>

        <div class="field">
          <label>Tags</label>
          <div class="pill-group" id="pill-group">
            <p class="status-msg" style="padding:0;font-size:0.875rem;">Loading…</p>
          </div>
        </div>

        <div class="field">
          <label for="comments">Comments</label>
          <textarea id="comments" rows="3" placeholder="Coaching notes, cues, variations…"></textarea>
        </div>

        <div class="progress-wrap hidden" id="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-text" id="progress-text">Uploading…</p>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary">Upload Movement</button>

      </form>
    </div>

    <!-- ── Bulk mode (hidden by default) ── -->
    <div id="bulk-mode" class="hidden">

      <div id="bulk-actions-top" class="bulk-actions">
        <div id="bulk-summary" class="hidden"></div>
        <div class="bulk-action-buttons">
          <button id="upload-btn-top" class="btn btn-primary bulk-upload-btn" onclick="uploadAll()">Upload All</button>
        </div>
      </div>

      <div id="bulk-queue" class="bulk-queue"></div>

      <div id="bulk-actions-bottom" class="bulk-actions">
        <button id="upload-btn-bottom" class="btn btn-primary bulk-upload-btn" onclick="uploadAll()">Upload All</button>
      </div>

    </div>

    <!-- ── Video preview modal ── -->
    <div id="video-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <button class="modal-close" onclick="closeVideoModal()">&#x2715;</button>
        <video id="modal-video" controls playsinline></video>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/upload.js"></script>
</body>
</html>
